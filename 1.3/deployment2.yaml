apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment2
  namespace: akapitulov-netology2
  labels:
    app: nginx
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      initContainers:
      - name: wait
        image: busybox
        command: ['sh', '-c', 'until nslookup service-nginx.akapitulov-netology2.svc.cluster.local.; do echo waiting for service-nginx; sleep 2; done;']
#        command: ['sh', '-c', "until nslookup service-nginx; do echo waiting for service-nginx; sleep 2; done"]
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
