apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mystorageclass
provisioner: k8s.io/minikube-hostpath 
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mypvc
spec:
  volumeMode: Filesystem
  storageClassName: mystorageclass
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange-sc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busymulti
  template:
    metadata:
      labels:
        app: busymulti
    spec:
      containers:
      - name: busybox
        image: busybox
        command: ["/bin/sh", "-c"] 
        args: ["echo $(date) > /etc/test/busybox.txt; sleep 3600"]
        volumeMounts:
        - name: mystorage
          mountPath: /etc/test/
      - name: multitools
        image: wbitt/network-multitool
        command: ["/bin/sh", "-c"]
        args: ["sleep 2; tail -f /etc/test/busybox.txt"] 
        volumeMounts:
        - name: mystorage
          mountPath: /etc/test/
      volumes:
      - name: mystorage
        persistentVolumeClaim:
          claimName: mypvc